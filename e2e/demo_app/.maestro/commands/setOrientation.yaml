appId: com.example.example
tags:
  - passing
---
# Test that setOrientation correctly rotates the device and that the app
# responds to orientation changes. Each assertion uses the specific label so a
# silently-failing setOrientation cannot produce a false positive.
#
# upside_down is not supported on modern iPhones: the command is a no-op and
# the device stays in its current orientation. The assertion validates that the
# driver does not crash when upside_down is requested on iOS.

- setOrientation: portrait
- launchApp:
    clearState: true

- tapOn: Orientation Test

- setOrientation: portrait
- assertVisible: Portrait

- setOrientation: landscape_left
- assertVisible: Landscape Left

- setOrientation: landscape_right
- assertVisible: Landscape Right

- setOrientation: upside_down
- runFlow:
    when:
      platform: Android
    commands:
      - assertVisible: Portrait Upside Down
- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible: Landscape Right # Upside down isn't supported on modern iOS devices. We expect no change, but expect the driver not to crash.

- setOrientation: portrait
- assertVisible: Portrait
